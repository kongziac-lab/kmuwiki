# KMU Wiki 인제스트 워커 — Synology DS920+ Container Manager 용.
#
# 사용:
#   1) .env.worker.example → .env.worker 로 복사하고 키 2개만 채운다.
#   2) 원본 ZIP 공유폴더 경로를 아래 volumes 의 호스트 경로로 지정한다.
#   3) 스테이징(투입 검증 반입): docker compose run --rm stager
#      1회성 배치 실행:          docker compose run --rm worker run
#      백필:                     docker compose run --rm worker backfill
#   4) NAS 작업 스케줄러에 야간 cron 으로 nas/run-ingest.sh 를 등록(스테이징→인제스트 순).
#
# 단계형 적재(00_inbox → 01_raw):
#   사용자는 Y:\Kmuwiki\00_inbox 에만 새 ZIP 을 넣는다. stager 가 구조 검증
#   (zip 폭탄·비정상·부분 업로드) 후 01_raw 로 반입하고, 실패분은 99_rejected 로
#   격리한다(reasons.log). 워커는 01_raw 만 :ro 로 읽는다.
#
# 보안 원칙(docs/nas-hub-architecture.md):
#   - 원본은 read-only(:ro) 마운트 — 워커는 원본을 읽기만 한다.
#   - 컨테이너 파일시스템 read_only + no-new-privileges + cap_drop=ALL.
#   - 비밀값은 .env.worker 로만 주입(이미지/깃 미포함). 워커는 키 2개만 필요:
#       SUPABASE_SERVICE_ROLE_KEY, COHERE_API_KEY
#     (Anthropic/Nous/Gemini/anon 키는 답변 생성용 → 여기에 넣지 않는다.)

services:
  worker:
    build: .
    image: kmu-ingest-worker
    env_file:
      - .env.worker
    environment:
      KMU_ZIP_DIR: /data/zips
      KMU_OCR_BACKEND: none        # OCR은 GPU 박스로 유예(pending_ocr)
      KMU_ENABLE_NER: "0"          # torch 미포함 이미지 — 성명 NER 비활성
      KMU_EMBED_PROVIDER: cohere   # 기본값 fake 방지: 실제 임베딩 강제
      KMU_EMBED_MODEL: embed-multilingual-v3.0   # Cohere 실제 모델(1024d). 기본 fake-deterministic 방지
      KMU_EMBED_VERSION: v3        # 기존 Supabase 데이터와 동일 모델 핀
    volumes:
      # 불변 원본(01_raw)만 읽는다. 새 ZIP 투입은 00_inbox → stager 검증 반입.
      # 리눅스는 대소문자 구분 — 실제 폴더명은 소문자 kmuwiki.
      # Windows Y:\Kmuwiki\01_raw  ==  NAS /volume1/jdh/kmuwiki/01_raw
      - /volume1/jdh/kmuwiki/01_raw:/data/zips:ro
    # ---- 하드닝 ----
    # Synology 공유폴더 ACL(drwxrwxrwx+) 때문에 비-root(uid 10001)는 원본을 못 읽음.
    # root로 실행해 ACL 우회. 마운트가 :ro + cap_drop/no-new-privileges 라 보호는 유지.
    user: "0:0"                    # root (Synology ACL 회피)
    read_only: true                # 컨테이너 루트 FS 읽기 전용
    tmpfs:
      - /tmp                       # 파싱 임시 파일용 쓰기 가능 영역
    # 주의: root(user 0:0)로 실행하므로 cap_drop:ALL 을 쓰면 DAC_OVERRIDE 가 사라져
    #       앱 코드(worker 소유)·ACL 원본을 못 읽는다. 그래서 cap_drop 은 제거.
    #       실질 보호는 :ro 마운트 + read_only 루트FS + no-new-privileges 로 유지.
    security_opt:
      - no-new-privileges:true
    # 배치 잡이므로 자동 재시작하지 않는다(스케줄러가 트리거).
    restart: "no"
    # 리소스 상한(4GB RAM NAS 보호). 8GB 증설 시 상향 가능.
    # 주의: Synology 커널은 CPU CFS 쿼터 미지원 → cpus 설정 불가(제거함).
    # CPU 제한이 필요하면 DSM Container Manager GUI에서 조정.
    mem_limit: 2g

  # 투입 검증 반입(00_inbox → 01_raw). 최소권한: 시크릿 불필요 → env_file 미사용.
  stager:
    build: .
    image: kmu-ingest-worker
    command: stage
    environment:
      KMU_INBOX_DIR: /data/inbox
      KMU_RAW_DIR: /data/raw
      KMU_REJECTED_DIR: /data/rejected
      # 검증 한도(기본값): KMU_STAGE_MIN_AGE_SECONDS=300, KMU_STAGE_MAX_ZIP_MB=1024,
      # KMU_STAGE_MAX_ENTRIES=5000, KMU_STAGE_MAX_UNCOMPRESSED_MB=4096
    volumes:
      - /volume1/jdh/kmuwiki/00_inbox:/data/inbox
      - /volume1/jdh/kmuwiki/01_raw:/data/raw
      - /volume1/jdh/kmuwiki/99_rejected:/data/rejected
    user: "0:0"                    # Synology ACL 회피(워커와 동일 사유)
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: "no"
    mem_limit: 1g

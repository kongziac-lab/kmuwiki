name: Security audit

on:
  pull_request:
    paths:
      - "web/package.json"
      - "web/package-lock.json"
      - "ingest/requirements*.in"
      - "ingest/requirements*.txt"
      - ".github/workflows/security-audit.yml"
  push:
    branches: [main]
    paths:
      - "web/package.json"
      - "web/package-lock.json"
      - "ingest/requirements*.in"
      - "ingest/requirements*.txt"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "23 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingest/requirements.txt
      - run: python -m pip install pip-audit==2.9.0
      - name: Audit every Python runtime profile
        run: |
          for lock in ingest/requirements.txt ingest/requirements-api.txt ingest/requirements-worker.txt; do
            pip-audit --disable-pip --require-hashes -r "$lock"
          done
